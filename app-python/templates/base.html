<!DOCTYPE html>
<html lang="en" class="h-full">

  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Scrollbar styling */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #1f2937; }
    ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #6b7280; }
  </style>
</head>
<body class="h-full bg-gray-900 text-gray-100 flex flex-col">

    <div class="max-w-screen-xl mx-auto px-4">

        </a>

          <a href="/analysis"   class="nav-link px-3 py-2 rounded-md text-sm font-medium text-gray-300 hover:bg-gray-700 hover:text-white transition-colors" data-i18n="nav.analysis">Analysis</a>
          <a href="/chat"       class="nav-link px-3 py-2 rounded-md text-sm font-medium text-gray-300 hover:bg-gray-700 hover:text-white transition-colors" data-i18n="nav.chat">Chat</a>
          <a href="/devices"    class="nav-link px-3 py-2 rounded-md text-sm font-medium text-gray-300 hover:bg-gray-700 hover:text-white transition-colors" data-i18n="nav.devices">Devices</a>
          <a href="/knowledge"  class="nav-link px-3 py-2 rounded-md text-sm font-medium text-gray-300 hover:bg-gray-700 hover:text-white transition-colors" data-i18n="nav.knowledge">Knowledge</a>

          <a href="/help"       class="nav-link px-3 py-2 rounded-md text-sm font-medium text-gray-300 hover:bg-gray-700 hover:text-white transition-colors" data-i18n="nav.help">Help</a>
        </div>

        <!-- Language toggle -->
        <div class="hidden md:flex items-center ml-4">
          <div class="flex items-center gap-1 bg-gray-700 rounded-lg p-0.5">
            <button onclick="setLang('en')" id="btn-en"
              class="px-2.5 py-1 text-xs font-semibold rounded-md transition-colors">EN</button>
            <button onclick="setLang('th')" id="btn-th"
              class="px-2.5 py-1 text-xs font-semibold rounded-md transition-colors">TH</button>
          </div>
        </div>

        <!-- Mobile menu button -->
        <div class="md:hidden ml-auto flex items-center gap-2">
          <div class="flex items-center gap-1 bg-gray-700 rounded-lg p-0.5">
            <button onclick="setLang('en')" id="btn-en-mobile"
              class="px-2.5 py-1 text-xs font-semibold rounded-md transition-colors">EN</button>
            <button onclick="setLang('th')" id="btn-th-mobile"
              class="px-2.5 py-1 text-xs font-semibold rounded-md transition-colors">TH</button>
          </div>
          <button id="mobile-menu-btn" class="p-2 rounded-md text-gray-400 hover:text-white hover:bg-gray-700 transition-colors" aria-label="Open menu">
            <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">

            </svg>
          </button>
        </div>
      </div>

      <!-- Mobile nav menu -->

    <div class="max-w-screen-xl mx-auto px-4 py-6">

  </main>

  let currentLang = localStorage.getItem('lang') || 'en';

  function t(key) {
    return (I18N[currentLang] && I18N[currentLang][key]) || (I18N['en'][key]) || key;
  }

  function applyLang(lang) {
    currentLang = lang;
    localStorage.setItem('lang', lang);
    // Update all data-i18n elements
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      const attr = el.getAttribute('data-i18n-attr');
      if (attr) {
        el.setAttribute(attr, t(key));
      } else {
        el.textContent = t(key);
      }
    });
    // Update toggle button styles (desktop)
    var btnEn = document.getElementById('btn-en');
    var btnTh = document.getElementById('btn-th');
    if (btnEn) btnEn.className = lang === 'en'
      ? 'px-2.5 py-1 text-xs font-semibold rounded-md bg-blue-600 text-white'
      : 'px-2.5 py-1 text-xs font-semibold rounded-md text-gray-400 hover:text-white';
    if (btnTh) btnTh.className = lang === 'th'
      ? 'px-2.5 py-1 text-xs font-semibold rounded-md bg-blue-600 text-white'
      : 'px-2.5 py-1 text-xs font-semibold rounded-md text-gray-400 hover:text-white';
    // Update toggle button styles (mobile)
    var btnEnM = document.getElementById('btn-en-mobile');
    var btnThM = document.getElementById('btn-th-mobile');
    if (btnEnM) btnEnM.className = lang === 'en'
      ? 'px-2.5 py-1 text-xs font-semibold rounded-md bg-blue-600 text-white'
      : 'px-2.5 py-1 text-xs font-semibold rounded-md text-gray-400 hover:text-white';
    if (btnThM) btnThM.className = lang === 'th'
      ? 'px-2.5 py-1 text-xs font-semibold rounded-md bg-blue-600 text-white'
      : 'px-2.5 py-1 text-xs font-semibold rounded-md text-gray-400 hover:text-white';
  }

  function setLang(lang) { applyLang(lang); }

  // Apply on load
  document.addEventListener('DOMContentLoaded', () => applyLang(currentLang));
  </script>

  <script>
    // Mobile menu toggle
    document.getElementById('mobile-menu-btn').addEventListener('click', function () {
      document.getElementById('mobile-menu').classList.toggle('hidden');
    });

    // Mark active nav link
    document.querySelectorAll('nav a.nav-link').forEach(function (a) {
      var href = a.getAttribute('href');
      var path = window.location.pathname;
      if (href === path || (path === '/' && href === '/dashboard')) {
        a.classList.add('bg-blue-600', 'text-white');
        a.classList.remove('text-gray-300');
      }
    });
  </script>
