{% extends "base.html" %}
{% block title %}Devices — Allegro NTD{% endblock %}

{% block content %}
<div class="flex items-center justify-between mb-6">
  <h1 class="text-2xl font-bold text-white">Devices</h1>
  <button onclick="openAddModal()"
    class="flex items-center gap-1.5 px-4 py-2 bg-blue-600 hover:bg-blue-500 text-white text-sm font-semibold rounded-lg transition-colors">
    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
    </svg>
    Add Device
  </button>
</div>

<!-- Error / success banner -->
<div id="banner" class="hidden mb-4 p-3 rounded-lg text-sm"></div>

<!-- Devices list -->
<div id="devices-container" class="space-y-3">
  <div class="text-gray-500 text-sm animate-pulse">Loading devices…</div>
</div>

<!-- Test result inline -->
<div id="test-result" class="hidden mt-4 p-4 bg-gray-800 border border-gray-700 rounded-xl">
  <div class="flex items-center justify-between mb-2">
    <h3 class="text-sm font-semibold text-gray-300">Connection Test Result</h3>
    <button onclick="document.getElementById('test-result').classList.add('hidden')" class="text-gray-500 hover:text-gray-300 text-xs">Dismiss</button>
  </div>
  <div id="test-result-body" class="text-sm text-gray-300"></div>
</div>

<!-- Add / Edit Device Modal -->
<div id="device-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4">
  <div class="absolute inset-0 bg-black/70" onclick="closeModal()"></div>
  <div class="relative bg-gray-800 border border-gray-700 rounded-2xl p-6 w-full max-w-md shadow-2xl">
    <h2 class="text-lg font-bold text-white mb-5" id="modal-title">Add Device</h2>
    <form id="device-form" onsubmit="submitDevice(event)" class="space-y-4">
      <input type="hidden" id="device-id" />
      <div>
        <label class="block text-xs text-gray-400 mb-1">Device Name <span class="text-red-400">*</span></label>
        <input id="d-name" type="text" required placeholder="Production Router"
          class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2.5 text-sm text-gray-100 placeholder-gray-500 focus:outline-none focus:border-blue-500" />
      </div>
      <div>
        <label class="block text-xs text-gray-400 mb-1">IP Address <span class="text-red-400">*</span></label>
        <div class="flex">
          <span class="inline-flex items-center px-3 bg-gray-600 border border-r-0 border-gray-600 rounded-l-lg text-gray-400 text-sm select-none">https://</span>
          <input id="d-ip" type="text" required placeholder="192.168.1.100"
            class="flex-1 bg-gray-700 border border-gray-600 rounded-r-lg px-3 py-2.5 text-sm text-gray-100 placeholder-gray-500 focus:outline-none focus:border-blue-500" />
        </div>
      </div>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-xs text-gray-400 mb-1">Username</label>
          <input id="d-username" type="text" placeholder="admin"
            class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2.5 text-sm text-gray-100 placeholder-gray-500 focus:outline-none focus:border-blue-500" />
        </div>
        <div>
          <label class="block text-xs text-gray-400 mb-1">Password</label>
          <input id="d-password" type="password" placeholder="••••••••"
            class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2.5 text-sm text-gray-100 placeholder-gray-500 focus:outline-none focus:border-blue-500" />
        </div>
      </div>
      <div class="flex items-center gap-2">
        <input id="d-verify-ssl" type="checkbox" checked
          class="w-4 h-4 rounded bg-gray-700 border-gray-600 text-blue-500 focus:ring-blue-500 cursor-pointer" />
        <label for="d-verify-ssl" class="text-sm text-gray-300 cursor-pointer">Verify SSL certificate</label>
      </div>
      <div id="modal-error" class="hidden p-3 bg-red-900/50 border border-red-700 rounded-lg text-red-300 text-xs"></div>
      <div class="flex gap-3 pt-2">
        <button type="submit"
          class="flex-1 py-2.5 bg-blue-600 hover:bg-blue-500 text-white text-sm font-semibold rounded-lg transition-colors">
          Save Device
        </button>
        <button type="button" onclick="closeModal()"
          class="flex-1 py-2.5 bg-gray-700 hover:bg-gray-600 text-gray-300 text-sm font-semibold rounded-lg transition-colors">
          Cancel
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
  function showBanner(msg, type) {
    var el = document.getElementById('banner');
    el.textContent = msg;
    el.className = 'mb-4 p-3 rounded-lg text-sm ' +
      (type === 'error' ? 'bg-red-900/60 border border-red-700 text-red-300' : 'bg-green-900/60 border border-green-700 text-green-300');
    el.classList.remove('hidden');
    setTimeout(function () { el.classList.add('hidden'); }, 4000);
  }

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  async function loadDevices() {
    try {
      var res = await fetch('/api/devices');
      var data = await res.json();
      var devices = data.devices || data || [];
      renderDevices(devices);
    } catch (err) {
      document.getElementById('devices-container').innerHTML =
        '<div class="text-red-400 text-sm">Failed to load devices: ' + escHtml(err.message) + '</div>';
    }
  }

  function renderDevices(devices) {
    var container = document.getElementById('devices-container');
    if (!devices.length) {
      container.innerHTML = '<div class="text-gray-500 text-sm bg-gray-800 border border-gray-700 rounded-xl p-8 text-center">No devices configured. Click "Add Device" to get started.</div>';
      return;
    }
    container.innerHTML = devices.map(function (dev) {
      var id = dev.id || dev.name;
      var isActive = dev.active || dev.is_active || false;
      var status = dev.status || (isActive ? 'active' : 'inactive');
      return '<div class="bg-gray-800 border border-gray-700 rounded-xl p-5 flex flex-col sm:flex-row sm:items-center gap-4" data-device-id="' + escHtml(id) + '">' +
        '<div class="flex-1 min-w-0">' +
          '<div class="flex items-center gap-2 mb-1">' +
            '<span class="font-semibold text-white truncate">' + escHtml(dev.name || 'Unnamed') + '</span>' +
            (isActive
              ? '<span class="px-2 py-0.5 text-xs font-bold rounded-full bg-green-900/60 text-green-400">Active</span>'
              : '<span class="px-2 py-0.5 text-xs font-bold rounded-full bg-gray-700 text-gray-400">Inactive</span>') +
          '</div>' +
          '<div class="text-xs text-gray-400 font-mono truncate">' + escHtml(dev.url || '—') + '</div>' +
          (dev.username ? '<div class="text-xs text-gray-500 mt-0.5">User: ' + escHtml(dev.username) + '</div>' : '') +
        '</div>' +
        '<div class="flex flex-wrap gap-2">' +
          (!isActive ? '<button onclick="activateDevice(\'' + escHtml(id) + '\')" class="px-3 py-1.5 bg-blue-600 hover:bg-blue-500 text-white text-xs font-semibold rounded-lg transition-colors">Activate</button>' : '') +
          '<button onclick="testDevice(\'' + escHtml(id) + '\')" class="px-3 py-1.5 bg-gray-700 hover:bg-gray-600 text-gray-200 text-xs font-semibold rounded-lg transition-colors">Test</button>' +
          '<button onclick="editDevice(\'' + escHtml(id) + '\')" class="px-3 py-1.5 bg-gray-700 hover:bg-gray-600 text-gray-200 text-xs font-semibold rounded-lg transition-colors">Edit</button>' +
          '<button onclick="deleteDevice(\'' + escHtml(id) + '\')" class="px-3 py-1.5 bg-red-800/60 hover:bg-red-700 text-red-300 text-xs font-semibold rounded-lg transition-colors">Delete</button>' +
        '</div>' +
      '</div>';
    }).join('');
  }

  async function activateDevice(id) {
    try {
      var res = await fetch('/api/devices/' + encodeURIComponent(id) + '/activate', { method: 'POST' });
      if (!res.ok) throw new Error((await res.json()).detail || res.statusText);
      showBanner('Device activated.', 'success');
      loadDevices();
    } catch (err) { showBanner('Error: ' + err.message, 'error'); }
  }

  async function testDevice(id) {
    var resultEl = document.getElementById('test-result');
    var bodyEl = document.getElementById('test-result-body');
    resultEl.classList.remove('hidden');
    bodyEl.textContent = 'Testing connection…';
    try {
      var res = await fetch('/api/devices/' + encodeURIComponent(id) + '/test', { method: 'GET' });
      var data = await res.json();
      if (res.ok && (data.success || data.ok || data.status === 'ok')) {
        bodyEl.innerHTML = '<span class="text-green-400 font-semibold">Connected successfully.</span>' +
          (data.message ? ' ' + escHtml(data.message) : '');
      } else {
        bodyEl.innerHTML = '<span class="text-red-400 font-semibold">Connection failed.</span> ' +
          escHtml(data.detail || data.message || 'Unknown error');
      }
    } catch (err) {
      bodyEl.innerHTML = '<span class="text-red-400 font-semibold">Error:</span> ' + escHtml(err.message);
    }
    resultEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  async function deleteDevice(id) {
    if (!confirm('ลบ device นี้?')) return;
    try {
      var res = await fetch('/api/devices/' + encodeURIComponent(id), { method: 'DELETE' });
      if (!res.ok) throw new Error((await res.json()).detail || res.statusText);
      showBanner('Device deleted.', 'success');
      loadDevices();
    } catch (err) { showBanner('Error: ' + err.message, 'error'); }
  }

  var _editingData = null;

  function editDevice(id) {
    // Find from current DOM or refetch
    openAddModal();
    document.getElementById('modal-title').textContent = 'Edit Device';
    document.getElementById('device-id').value = id;
    // Try to fill from stored data
    if (_editingData && _editingData[id]) {
      var dev = _editingData[id];
      document.getElementById('d-name').value = dev.name || '';
      // Strip https:// prefix for IP field
      var ipVal = (dev.url || '').replace(/^https?:\/\//, '');
      document.getElementById('d-ip').value = ipVal;
      document.getElementById('d-username').value = dev.username || '';
      document.getElementById('d-verify-ssl').checked = dev.verify_ssl !== false;
    }
  }

  function openAddModal() {
    document.getElementById('device-form').reset();
    document.getElementById('device-id').value = '';
    document.getElementById('modal-title').textContent = 'Add Device';
    document.getElementById('modal-error').classList.add('hidden');
    document.getElementById('device-modal').classList.remove('hidden');
  }

  function closeModal() {
    document.getElementById('device-modal').classList.add('hidden');
  }

  async function submitDevice(e) {
    e.preventDefault();
    var errEl = document.getElementById('modal-error');
    errEl.classList.add('hidden');

    var id = document.getElementById('device-id').value;
    var ip = document.getElementById('d-ip').value.trim();
    var url = ip.startsWith('http://') || ip.startsWith('https://') ? ip : 'https://' + ip;
    var payload = {
      name: document.getElementById('d-name').value.trim(),
      url: url,
      username: document.getElementById('d-username').value.trim(),
      password: document.getElementById('d-password').value,
      verify_ssl: document.getElementById('d-verify-ssl').checked
    };

    try {
      var res;
      if (id) {
        res = await fetch('/api/devices/' + encodeURIComponent(id), {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
      } else {
        res = await fetch('/api/devices', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
      }

      if (!res.ok) {
        var err = await res.json().catch(function () { return {}; });
        errEl.textContent = err.detail || 'Failed to save device.';
        errEl.classList.remove('hidden');
        return;
      }
      closeModal();
      showBanner(id ? 'Device updated.' : 'Device added.', 'success');
      loadDevices();
    } catch (err) {
      errEl.textContent = err.message;
      errEl.classList.remove('hidden');
    }
  }

  // Pre-cache device data for edit
  async function cacheDeviceData() {
    try {
      var res = await fetch('/api/devices');
      var data = await res.json();
      var devices = data.devices || data || [];
      _editingData = {};
      devices.forEach(function (dev) {
        _editingData[dev.id || dev.name] = dev;
      });
    } catch (e) { /* ignore */ }
  }

  loadDevices();
  cacheDeviceData();
</script>
{% endblock %}
